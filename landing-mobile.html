const HeroSection = () => {
  const dashRef = React.useRef(null);

  React.useEffect(() => {
    const root = dashRef.current;
    if (!root) return;

    const elements = root.querySelectorAll('[data-reveal]');

    const onMove = (e) => {
      const radius = Math.min(window.innerWidth, window.innerHeight) / 2.8;
      elements.forEach((el) => {
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const d = Math.sqrt(dx*dx + dy*dy);
        const intensity = Math.max(0, 1 - d / radius);
        el.style.setProperty('--intensity', intensity.toFixed(3));
      });
    };

    const onLeave = () => {
      elements.forEach((el) => el.style.setProperty('--intensity', '0'));
    };

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseleave', onLeave);

    const onTouch = (e) => {
      if (!e.touches || !e.touches[0]) return;
      const t = e.touches[0];
      const radius = Math.min(window.innerWidth, window.innerHeight) / 2.2;
      elements.forEach((el) => {
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = t.clientX - cx;
        const dy = t.clientY - cy;
        const d = Math.sqrt(dx*dx + dy*dy);
        const intensity = Math.max(0, 1 - d / radius);
        el.style.setProperty('--intensity', intensity.toFixed(3));
      });
    };
    window.addEventListener('touchmove', onTouch, {passive: true});
    window.addEventListener('touchstart', onTouch, {passive: true});
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseleave', onLeave);
    };

const KPICard = ({ label, value, hint, status }) => {
  const color = status === "bad" ? "text-crit-dark" : status === "warn" ? "text-warn-dark" : "text-ok-dark";
  // Long currency strings need smaller type to avoid overflow in 4-col grid
  const isLong = String(value).length > 6;
  const sizeCls = isLong ? "text-lg md:text-2xl" : "text-2xl md:text-3xl";
  return (
    <div className="border border-hero-hair bg-hero-glass p-5 min-w-0">
      <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-hero-mute">{label}</div>
      <div className={`mt-3 ${sizeCls} font-bold tabular-nums ${color} truncate`}>{value}</div>
      <div className="mt-1 text-xs text-hero-mute leading-snug">{hint}</div>
    </div>
  );
};

const Tab = ({ active, onClick, children }) => (
  <button onClick={onClick}

    }`}>

  </button>
);

    <span className={`inline-flex items-center px-2.5 py-1 text-[10px] font-mono tracking-[0.18em] uppercase border ${tones[tone]}`}>

  );
};
