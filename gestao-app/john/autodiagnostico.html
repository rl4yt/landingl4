const useCountUp = (target, start, duration = 1600) => {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!start) return;
    let raf, t0;
    const tick = (t) => {
      if (!t0) t0 = t;
      const k = Math.min(1, (t - t0) / duration);
      const eased = 1 - Math.pow(1 - k, 3);
      setVal(target * eased);
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, start, duration]);
  return val;
};

const maskPhone = (raw) => {
  const d = raw.replace(/\D/g, "").slice(0, 13);
  let out = "+55 ";
  let rest = d.startsWith("55") ? d.slice(2) : d;
  rest = rest.slice(0, 11);
  if (rest.length > 0) out += "(" + rest.slice(0, 2);
  if (rest.length >= 2) out += ") ";
  if (rest.length > 2) out += rest.slice(2, 7);
  if (rest.length > 7) out += "-" + rest.slice(7, 11);
  return out;
};
const phoneE164 = (raw) => {
  const d = raw.replace(/\D/g, "");
  return d.length >= 10 ? "+" + d : null;
};
const isEmail = (s) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);

                  <div className="mt-1 text-base text-hero-fg leading-snug">{a.alert}</div>
                </div>
              </div>
            );
          })}
        </div>
        <style>{`@keyframes john-fadein { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(6px); } }`}</style>
      </div>

      <div className="border-t border-hero-hair pt-8">
        <div className="font-mono text-[10px] tracking-[0.28em] uppercase text-hero-mute mb-3">Benchmark do setor</div>
        <p className="text-base text-hero-fg leading-relaxed max-w-2xl">
          Construtoras BR de porte equivalente gastam, em média, <span className="font-mono text-accent">18 a 25h/semana</span> por modelador
          em tarefas repetitivas (Parts, EAP, tabelas, cotagem). Equipes com BIM 5D maduro ficam
          abaixo de <span className="font-mono text-accent">5h/semana</span>.
        </p>
        <p className="mt-3 text-base text-hero-fg leading-relaxed max-w-2xl">
          Seu score posiciona sua operação BIM no terço <strong className="text-accent">{tercio}</strong> do setor.
        </p>
      </div>

      <div className="border-t border-hero-hair pt-8 space-y-4">
        <div>
          <a href={CALENDLY_URL} target="_blank" rel="noopener noreferrer"
             className="inline-flex items-center gap-3 bg-accent text-hero-bg px-7 h-14 text-sm font-semibold hover:bg-cyan-300 transition-colors rounded-full font-mono uppercase tracking-[0.22em]">
            Agendar Demo do John
            <IconArrowRight className="h-4 w-4" />
          </a>
          <div className="mt-3 text-sm text-hero-mute max-w-xl">
            John roda /john-diagnose no seu modelo .rvt ao vivo. 30 min. Saímos com mapa de operações.
          </div>
        </div>
        <div>
          <a href={WHATSAPP_URL} target="_blank" rel="noopener noreferrer"
             className="inline-flex items-center gap-3 border border-hero-hair px-6 h-12 text-sm font-medium hover:bg-hero-glass hover:border-accent transition-colors rounded-full font-mono uppercase tracking-[0.2em] text-[11px]">
            <IconWA className="h-4 w-4" />
            Falar no WhatsApp
          </a>
        </div>
        <button type="button" onClick={onReset}
          className="font-mono text-[10px] tracking-[0.2em] uppercase text-hero-mute hover:text-accent transition-colors pt-3">
          ↺ Refazer autodiagnóstico
        </button>
      </div>
    </div>
  );
};

/* ----------------------------- APP ----------------------------- */
const App = () => {
  const [phase, setPhase] = useState("lead");
  const [lead, setLead] = useState(null);
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [dir, setDir] = useState("fwd");

  const total = QUESTIONS.length;
  const q = QUESTIONS[step];
  const currentVal = q ? answers[q.id] : undefined;

  const onLead = (data) => {
    setLead(data);
    setPhase("quiz");
    console.log("[John lead]", data);
  };

  const onPick = (idx) => {
    setAnswers((a) => ({ ...a, [q.id]: idx }));
    setTimeout(() => {
      if (step < total - 1) {
        setDir("fwd");
        setStep((s) => s + 1);
      } else {
        setPhase("result");
      }
    }, 250);
  };

  const onBack = () => {
    if (step === 0) { setPhase("lead"); return; }
    setDir("back");
    setStep((s) => s - 1);
  };

  const onNext = () => {
    if (currentVal === undefined) return;
    if (step < total - 1) {
      setDir("fwd");
      setStep((s) => s + 1);
    } else {
      setPhase("result");
    }
  };

  const { score, alertsTop3 } = useMemo(() => {
    let total = 0;
    const fired = [];
    QUESTIONS.forEach((q) => {
      const idx = answers[q.id];
      if (idx === undefined) return;
      const opt = q.options[idx];
      total += opt.weight;
      if (opt.alert) fired.push({ qid: q.id, weight: opt.weight, alert: opt.alert });
    });
    // Max possible weight: 9 + 10 + 10 + 10 + 9 + 10 + 10 + 8 = 76
    const score = Math.round((total / 76) * 100);
    const top3 = [...fired].sort((a,b) => b.weight - a.weight).slice(0, 3);
    return { score, alertsTop3: top3 };
  }, [answers]);

  useEffect(() => {
    if (phase === "result") {
      console.log("[John autodiagnóstico]", { lead, respostas: answers, score, alertas: alertsTop3 });
    }
  }, [phase]);

  const onReset = () => {
    setAnswers({});
    setStep(0);
    setPhase("lead");
    setLead(null);
  };

  return (
    <div className="min-h-screen flex flex-col">
      <Header />
      <main className="flex-1 px-6 md:px-16 py-12 md:py-16">
        <div className="max-w-2xl mx-auto">
          {phase === "quiz" && (
            <div className="mb-12">
              <ProgressBar step={step + 1} total={total} />
            </div>
          )}

          {phase === "lead" && <LeadGate onSubmit={onLead} />}

          {phase === "quiz" && (
            <div>
              <QuestionStep q={q} value={currentVal} onPick={onPick} dir={dir} />
              <div className="mt-12 flex items-center justify-between">
                <button type="button" onClick={onBack}
                  className="inline-flex items-center gap-2 font-mono text-xs uppercase tracking-[0.2em] text-hero-mute hover:text-accent transition-colors">
                  <IconArrowLeft className="h-3.5 w-3.5" />
                  Voltar
                </button>
                <button type="button" onClick={onNext}
                  disabled={currentVal === undefined}
                  className={`inline-flex items-center gap-2 font-mono text-xs uppercase tracking-[0.2em] transition-colors
                    ${currentVal === undefined
                      ? "text-hero-mute-2 cursor-not-allowed"
                      : "text-accent hover:text-cyan-300"}`}>
                  {step === total - 1 ? "Ver resultado" : "Próximo"}
                  <IconArrowRight className="h-3.5 w-3.5" />
                </button>
              </div>
            </div>
          )}

          {phase === "result" && (
            <ResultScreen score={score} alertsTop3={alertsTop3} lead={lead} onReset={onReset} />
          )}
        </div>
      </main>

      <footer className="px-6 md:px-16 py-6 border-t border-hero-hair flex items-center justify-between flex-wrap gap-3 font-mono text-[10px] tracking-[0.2em] uppercase text-hero-mute">
        <span>John · L4 Engenharia · Autodiagnóstico</span>
        <span>Cálculo client-side · sem armazenamento externo</span>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
