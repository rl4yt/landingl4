const useCountUp = (target, start, duration = 1600) => {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!start) return;
    let raf, t0;
    const tick = (t) => {
      if (!t0) t0 = t;
      const k = Math.min(1, (t - t0) / duration);
      const eased = 1 - Math.pow(1 - k, 3); // cubic ease-out
      setVal(target * eased);
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, start, duration]);
  return val;
};

const maskPhone = (raw) => {
  const d = raw.replace(/\D/g, "").slice(0, 13); // up to country+ddd+9digit
  // Display BR mask: +55 (XX) XXXXX-XXXX
  let out = "+55 ";
  let rest = d.startsWith("55") ? d.slice(2) : d;
  rest = rest.slice(0, 11);
  if (rest.length > 0) out += "(" + rest.slice(0, 2);
  if (rest.length >= 2) out += ") ";
  if (rest.length > 2) out += rest.slice(2, 7);
  if (rest.length > 7) out += "-" + rest.slice(7, 11);
  return out;
};
const phoneE164 = (raw) => {
  const d = raw.replace(/\D/g, "");
  return d.length >= 10 ? "+" + d : null;
};
const isEmail = (s) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);

                : "text-crit-dark";
  const bandText = score <= 25
    ? "Risco baixo. Controladoria parece sob controle. Diagnóstico completo otimiza margem."
    : score <= 50
    ? "Risco moderado. Sinais de descontrole detectados. Ainda dá tempo de recuperar margem deste ciclo."
    : score <= 75
    ? "Risco alto. Você está descobrindo problemas tarde. Próximo estouro provável em menos de 60 dias."
    : "Risco crítico. Decisão executiva chegando atrasada. Reunião de diretoria operando no escuro.";
  const tercio = score <= 25 ? "superior" : score <= 60 ? "médio" : "inferior";
  return (
    <div className="space-y-12">
      <div>
        <div className="font-mono text-[10px] tracking-[0.28em] uppercase text-hero-mute">
          Score de risco · {lead?.empresa || "—"}
        </div>
        <div className={`mt-4 text-7xl md:text-8xl font-extrabold tabular-nums tracking-tight ${colorCls}`}
             style={{ fontFeatureSettings: '"tnum"' }}>
          {Math.round(animScore)}
          <span className="text-3xl md:text-4xl text-hero-mute font-mono align-top ml-2">/100</span>
        </div>
        <p className="mt-5 text-lg md:text-xl text-hero-fg leading-snug max-w-2xl text-pretty">
          {bandText}
        </p>
      </div>

      <div>
        <div className="flex items-baseline justify-between border-b border-hero-hair/15 pb-3 mb-4">
          <div className="font-mono text-[10px] tracking-[0.28em] uppercase text-hero-mute">3 sinais detectados</div>
          <div className="font-mono text-[10px] tracking-[0.2em] uppercase text-hero-mute">{alertsTop3.length} crítico(s)</div>
        </div>
        {alertsTop3.length === 0 && (
          <div className="text-sm text-hero-fg/85 py-2">
            Nenhum sinal crítico foi detectado nas suas respostas. Ainda assim, o diagnóstico completo identifica
            oportunidades de margem que escapam do olho.
          </div>
        )}
        <div>
          {alertsTop3.map((a, i) => {
            const high = a.weight >= 9;
            const Ic = high ? IconAlertHigh : IconAlertMed;
            return (
              <div key={i} className="flex items-start gap-4 py-4 border-b border-hero-hair/10 last:border-b-0"
                style={{
                  opacity: 0,
                  animation: `l4-fadein 600ms cubic-bezier(0.22,1,0.36,1) ${i * 150 + 200}ms forwards`,
                }}>
                <Ic className={`h-5 w-5 flex-shrink-0 mt-0.5 ${high ? "text-crit-dark" : "text-warn-dark"}`} />
                <div>
                  <div className="font-mono text-[10px] tracking-[0.18em] uppercase text-hero-mute">
                    {high ? "Crítico" : "Atenção"} · peso {a.weight}/10
                  </div>
                  <div className="mt-1 text-base text-hero-fg leading-snug">{a.alert}</div>
                </div>
              </div>
            );
          })}
        </div>
        <style>{`@keyframes l4-fadein { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(6px); } }`}</style>
      </div>

      <div className="border-t border-hero-hair/15 pt-8">
        <div className="font-mono text-[10px] tracking-[0.28em] uppercase text-hero-mute mb-3">Benchmark setor</div>
        <p className="text-base text-hero-fg leading-relaxed max-w-2xl">
          Construtoras BR de porte equivalente operam com IDC médio <span className="font-mono">0,93</span> e
          IDP médio <span className="font-mono">0,91</span>. Construtoras com PMO interno chegam a IDC <span className="font-mono">0,97</span>.
        </p>
        <p className="mt-3 text-base text-hero-fg leading-relaxed max-w-2xl">
          Seu score posiciona você no terço <strong>{tercio}</strong> do setor.
        </p>
      </div>

      <div className="border-t border-hero-hair/15 pt-8 space-y-4">
        <div>
          <a href={CALENDLY_URL} target="_blank" rel="noopener noreferrer"
             className="inline-flex items-center gap-3 bg-hero-fg text-hero-bg px-7 h-14 text-base font-medium hover:bg-hero-glass transition-colors">
            Agendar Diagnóstico Completo
            <IconArrowRight className="h-4 w-4" />
          </a>
          <div className="mt-3 text-sm text-hero-mute max-w-xl">
            Análise dos 4 módulos com seus dados reais. Plano de ação cirúrgico em 7 dias.
          </div>
        </div>
        <div>
          <a href={WHATSAPP_URL} target="_blank" rel="noopener noreferrer"
             className="inline-flex items-center gap-3 border border-hero-hair px-6 h-12 text-sm font-medium hover:bg-hero-fg hover:text-hero-bg transition-colors">
            <IconWA className="h-4 w-4" />
            Falar no WhatsApp
          </a>
        </div>
        <button type="button" onClick={onReset}
          className="font-mono text-[10px] tracking-[0.2em] uppercase text-hero-mute hover:text-black transition-colors pt-3">
          ↺ Refazer diagnóstico
        </button>
      </div>
    </div>
  );
};

/* ----------------------------- APP ----------------------------- */
const App = () => {
  const [phase, setPhase] = useState("lead"); // lead | quiz | result
  const [lead, setLead] = useState(null);
  const [step, setStep] = useState(0); // 0..QUESTIONS.length-1
  const [answers, setAnswers] = useState({}); // id -> optionIndex
  const [dir, setDir] = useState("fwd");

  const total = QUESTIONS.length;
  const q = QUESTIONS[step];
  const currentVal = q ? answers[q.id] : undefined;

  const onLead = (data) => {
    setLead(data);
    setPhase("quiz");
    console.log("[L4 lead]", data);
  };

  const onPick = (idx) => {
    setAnswers((a) => ({ ...a, [q.id]: idx }));
    // auto-advance
    setTimeout(() => {
      if (step < total - 1) {
        setDir("fwd");
        setStep((s) => s + 1);
      } else {
        setPhase("result");
      }
    }, 250);
  };

  const onBack = () => {
    if (step === 0) { setPhase("lead"); return; }
    setDir("back");
    setStep((s) => s - 1);
  };

  const onNext = () => {
    if (currentVal === undefined) return;
    if (step < total - 1) {
      setDir("fwd");
      setStep((s) => s + 1);
    } else {
      setPhase("result");
    }
  };

  const { score, alertsTop3 } = useMemo(() => {
    let total = 0;
    const fired = [];
    QUESTIONS.forEach((q) => {
      const idx = answers[q.id];
      if (idx === undefined) return;
      const opt = q.options[idx];
      total += opt.weight;
      if (opt.alert) fired.push({ qid: q.id, weight: opt.weight, alert: opt.alert });
    });
    const score = Math.round((total / 80) * 100);
    const top3 = [...fired].sort((a,b) => b.weight - a.weight).slice(0, 3);
    return { score, alertsTop3: top3 };
  }, [answers]);

  // Bonus pixel on entering result
  useEffect(() => {
    if (phase === "result") {
      console.log("[L4 diagnóstico completo]", { lead, respostas: answers, score, alertas: alertsTop3 });
    }
  }, [phase]);

  const onReset = () => {
    setAnswers({});
    setStep(0);
    setPhase("lead");
    setLead(null);
  };

  return (
    <div className="min-h-screen flex flex-col">
      <Header />
      <main className="flex-1 px-6 md:px-16 py-12 md:py-16">
        <div className="max-w-2xl mx-auto">
          {phase === "quiz" && (
            <div className="mb-12">
              <ProgressBar step={step + 1} total={total} />
            </div>
          )}

          {phase === "lead" && <LeadGate onSubmit={onLead} />}

          {phase === "quiz" && (
            <div>
              <QuestionStep q={q} value={currentVal} onPick={onPick} dir={dir} />
              <div className="mt-12 flex items-center justify-between">
                <button type="button" onClick={onBack}
                  className="inline-flex items-center gap-2 font-mono text-xs uppercase tracking-[0.2em] text-hero-mute hover:text-black transition-colors">
                  <IconArrowLeft className="h-3.5 w-3.5" />
                  Voltar
                </button>
                <button type="button" onClick={onNext}
                  disabled={currentVal === undefined}
                  className={`inline-flex items-center gap-2 font-mono text-xs uppercase tracking-[0.2em] transition-colors
                    ${currentVal === undefined
                      ? "text-hero-mute cursor-not-allowed"
                      : "text-black hover:text-hero-mute"}`}>
                  {step === total - 1 ? "Ver resultado" : "Próximo"}
                  <IconArrowRight className="h-3.5 w-3.5" />
                </button>
              </div>
            </div>
          )}

          {phase === "result" && (
            <ResultScreen score={score} alertsTop3={alertsTop3} lead={lead} onReset={onReset} />
          )}
        </div>
      </main>

      <footer className="px-6 md:px-16 py-6 border-t border-hero-hair/5 flex items-center justify-between flex-wrap gap-3 font-mono text-[10px] tracking-[0.2em] uppercase text-hero-mute">
        <span>Gestão L4 · Auto-diagnóstico</span>
        <span>Cálculo client-side · sem armazenamento externo</span>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
