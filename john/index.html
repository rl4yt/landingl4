const HeroSection = () => {
  const dashRef = React.useRef(null);

  React.useEffect(() => {
    const root = dashRef.current;
    if (!root) return;

    const elements = root.querySelectorAll('[data-reveal]');

    const onMove = (e) => {
      const radius = Math.min(window.innerWidth, window.innerHeight) / 2.8;
      elements.forEach((el) => {
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const d = Math.sqrt(dx*dx + dy*dy);
        const intensity = Math.max(0, 1 - d / radius);
        el.style.setProperty('--intensity', intensity.toFixed(3));
      });
    };

    const onLeave = () => {
      elements.forEach((el) => el.style.setProperty('--intensity', '0'));
    };

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseleave', onLeave);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseleave', onLeave);
    };
  }, []);

/* ----- ANIMATION HOOKS ----- */
const useDashView = (threshold = 0.15) => {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current || inView) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [inView, threshold]);
  return [ref, inView];
};

const useCountTo = (target, active, duration = 1800) => {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!active) { setVal(0); return; }
    let raf, t0;
    const tick = (t) => {
      if (!t0) t0 = t;
      const k = Math.min(1, (t - t0) / duration);
      const eased = 1 - Math.pow(1 - k, 4);
      setVal(Math.round(target * eased));
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, active, duration]);
  return val;
};

const MiniSpark = ({ values, active, color = "#00E5FF" }) => {
  const max = Math.max(...values), min = Math.min(...values);
  const range = max - min || 1;
  const w = 120, h = 30;
  const pts = values.map((v, i) => `${(i / (values.length - 1)) * w},${h - ((v - min) / range) * (h - 2) - 1}`).join(" ");
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" className="mt-3"
      style={{ opacity: active ? 1 : 0, transition: "opacity 800ms 1400ms ease-out" }}>
      <polyline fill="none" stroke={color} strokeWidth="1.5" points={pts} strokeLinecap="round" strokeLinejoin="round"
        style={{ filter: `drop-shadow(0 0 4px ${color})` }}/>
    </svg>
  );
};

          <div className="font-mono text-[10px] uppercase tracking-[0.25em] text-hero-mute">Sem urgência</div>
          <div className="mt-4 font-serif text-2xl font-medium tracking-tight">Lista de espera</div>
          <div className="mt-2 text-sm text-hero-mute leading-relaxed">
            Receba avisos de novas skills do John e abertura de slots.
          </div>
          {submitted ? (
            <div className="mt-6 text-sm font-mono text-accent inline-flex items-center gap-2">
              <IconCheck className="h-4 w-4" strokeWidth={2.5}/> Recebido. Em breve entramos em contato.
            </div>
          ) : (
            <div className="mt-6 flex gap-2">
              <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)}
                placeholder="seu@email.com"
                className="flex-1 bg-transparent border border-hero-hair focus:border-accent outline-none text-white placeholder:text-hero-mute px-3 h-10 text-sm font-mono" />
              <button type="submit" className="bg-hero-fg text-hero-bg hover:bg-white transition px-4 h-10 text-[10px] tracking-[0.24em] uppercase font-semibold font-mono rounded-full">
                OK
              </button>
            </div>
          )}
        </form>
      </div>

      <div className="mt-16 pt-8 border-t border-hero-hair flex items-center gap-4 text-xs font-mono text-hero-mute flex-wrap">
        <IconShield className="h-4 w-4" strokeWidth={1.6}/>
        <span>Modelo nunca sai do seu PC · roda 100% local · suporte humano em cada sessão</span>
      </div>

      <div className="mt-16 flex flex-col md:flex-row md:items-center md:justify-between gap-6">
        <Wordmark dark />
        <div className="font-mono text-[11px] tracking-[0.18em] text-hero-mute">© John · L4 Engenharia · Ilhéus · Bahia · Brasil</div>
      </div>
    </section>
  );
};
