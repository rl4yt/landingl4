/* ----------------------------- COPY BUTTON ----------------------------- */
const CopyCode = ({ code, label = "Comando" }) => {
  const [copied, setCopied] = useState(false);
  const copy = async () => {
    try {
      await navigator.clipboard.writeText(code);
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    } catch (e) {
      console.error(e);
    }
  };
  return (
    <div className="border border-hero-hair bg-hero-bg-3 overflow-hidden">
      <div className="flex items-center justify-between px-3 py-1.5 border-b border-hero-hair bg-hero-glass">
        <div className="flex items-center gap-2 text-[10px] tracking-[0.24em] uppercase font-mono text-hero-mute">
          <IconTerminal className="h-3 w-3" strokeWidth={2}/>
          {label}
        </div>
        <button onClick={copy}
          className="inline-flex items-center gap-1.5 text-[10px] tracking-[0.18em] uppercase font-mono text-hero-mute hover:text-accent transition px-2 py-0.5">
          {copied ? <><IconCheck className="h-3 w-3" strokeWidth={2.5}/> copiado</> : <><IconCopy className="h-3 w-3" strokeWidth={2}/> copiar</>}
        </button>
      </div>
      <pre className="px-4 py-3 text-sm text-hero-fg overflow-x-auto whitespace-pre">{code}</pre>
    </div>
  );
};

/* ----------------------------- DOWNLOAD BUTTON ----------------------------- */
const DownloadBtn = ({ href, children, primary = false, external = true, disabled = false }) => {
  const cls = primary
    ? "bg-accent text-hero-bg hover:bg-cyan-300"
    : "border border-hero-hair text-hero-fg hover:border-accent hover:bg-hero-glass";
  if (disabled) {
    return (
      <span className="inline-flex items-center gap-2 px-5 h-11 text-[11px] tracking-[0.22em] uppercase font-semibold rounded-full font-mono border border-hero-hair text-hero-mute-2 cursor-not-allowed">
        {children}
      </span>
    );
  }
  return (
    <a href={href} target={external ? "_blank" : undefined} rel={external ? "noopener noreferrer" : undefined}
       className={`inline-flex items-center gap-2 px-5 h-11 text-[11px] tracking-[0.22em] uppercase font-semibold rounded-full font-mono transition ${cls}`}>
      {children}
    </a>
  );
};

/* ----------------------------- BLOCK RENDERER ----------------------------- */
const Block = ({ b }) => {
  if (b.type === "checklist") return (
    <div>
      <div className="font-mono text-[10px] tracking-[0.24em] uppercase text-hero-mute mb-3">{b.title}</div>
      <ul className="border border-hero-hair divide-y divide-hero-hair">
        {b.items.map((it, i) => (
          <li key={i} className="flex items-start gap-3 px-4 py-3 text-sm">
            <div className="h-4 w-4 mt-0.5 border border-hero-hair rounded-sm flex-shrink-0" />
            <div className="flex-1">
              <div className="font-medium">{it.k}</div>
              {it.v && <div className="text-xs text-hero-mute font-mono mt-0.5">{it.v}</div>}
            </div>
          </li>
        ))}
      </ul>
    </div>
  );
  if (b.type === "btns") return (
    <div className="flex flex-wrap gap-3">
      {b.items.map((bt, i) => (
        <DownloadBtn key={i} href={bt.href} primary={bt.primary} disabled={bt.disabled}>
          {bt.icon === "download" && <IconDownload className="h-4 w-4" strokeWidth={2}/>}
          {bt.icon === "external" && <IconExternal className="h-4 w-4" strokeWidth={2}/>}
          {bt.label}
        </DownloadBtn>
      ))}
    </div>
  );
  if (b.type === "or") return (
    <div className="flex items-center gap-3 text-[10px] tracking-[0.24em] uppercase font-mono text-hero-mute-2">
      <div className="h-px flex-1 bg-hero-hair"/>
      <span>{b.text}</span>
      <div className="h-px flex-1 bg-hero-hair"/>
    </div>
  );
  if (b.type === "code") return <CopyCode code={b.code} label={b.label}/>;
  if (b.type === "verify") return (
    <div className="border border-accent/30 bg-accent/[0.04] p-4">
      <div className="font-mono text-[10px] tracking-[0.24em] uppercase text-accent mb-2 flex items-center gap-2">
        <IconCheck className="h-3 w-3" strokeWidth={2.5}/> {b.title || "Verificação"}
      </div>
      {b.code && <CopyCode code={b.code} label="Verificar"/>}
      {b.expect && <div className="mt-2 text-sm text-hero-fg">{b.expect}</div>}
    </div>
  );
  if (b.type === "ordered") return (
    <div>
      {b.title && <div className="font-mono text-[10px] tracking-[0.24em] uppercase text-hero-mute mb-3">{b.title}</div>}
      <ol className="space-y-2.5">
        {b.items.map((it, i) => (
          <li key={i} className="flex items-start gap-3 text-sm">
            <span className="font-mono text-[11px] text-accent tabular-nums mt-0.5 flex-shrink-0 w-5">{i + 1}.</span>
            <span dangerouslySetInnerHTML={{__html: it.replace(/`([^`]+)`/g, '<code class="bg-hero-bg-3 text-accent px-1.5 py-0.5 text-[12px] border border-hero-hair">$1</code>')}}/>
          </li>
        ))}
      </ol>
    </div>
  );
  if (b.type === "warn") return (
    <div className="border border-warn-dark/40 bg-warn-dark/[0.06] p-4 flex items-start gap-3">
      <IconAlert className="h-4 w-4 text-warn-dark mt-0.5 flex-shrink-0" strokeWidth={2}/>
      <div className="text-sm text-hero-fg">{b.text}</div>
    </div>
  );
  if (b.type === "note") return b.text ? (
    <div className="text-xs text-hero-mute font-mono italic">{b.text}</div>
  ) : null;
  if (b.type === "tree") return (
    <div>
      <div className="font-mono text-[10px] tracking-[0.24em] uppercase text-hero-mute mb-3">{b.title}</div>
      <pre className="border border-hero-hair bg-hero-bg-3 p-4 text-xs text-hero-fg overflow-x-auto whitespace-pre">{b.lines.join("\n")}</pre>
    </div>
  );
  if (b.type === "skills") return (
    <div>
      <div className="font-mono text-[10px] tracking-[0.24em] uppercase text-hero-mute mb-3">Skills disponíveis</div>
      <div className="border border-hero-hair divide-y divide-hero-hair">
        {b.items.map((s, i) => (
          <div key={i} className="grid grid-cols-12 gap-3 px-4 py-3 text-sm items-center">
            <div className="col-span-12 md:col-span-5 font-mono text-accent text-xs md:text-sm flex items-center gap-2">
              <IconTerminal className="h-3 w-3" strokeWidth={2}/>{s.cmd}
            </div>
            <div className="col-span-12 md:col-span-7 text-hero-mute text-xs md:text-sm">{s.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
  if (b.type === "support") return (
    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
      <a href={`https://wa.me/${WHATSAPP_NUMBER.replace(/[^0-9]/g, "")}?text=${encodeURIComponent("Olá Romell, instalei o John mas preciso de ajuda em algum passo.")}`}
         target="_blank" rel="noopener noreferrer"
         className="border border-hero-hair p-5 hover:border-accent hover:bg-hero-glass transition flex items-start gap-3">
        <IconChat className="h-5 w-5 text-accent flex-shrink-0 mt-0.5" strokeWidth={2}/>
        <div>
          <div className="font-mono text-[10px] tracking-[0.22em] uppercase text-hero-mute">Suporte</div>
          <div className="mt-1 font-semibold">WhatsApp Romell</div>
          <div className="text-xs text-hero-mute font-mono mt-0.5">{WHATSAPP_DISPLAY}</div>
        </div>
      </a>
      <a href={CALENDLY_URL} target="_blank" rel="noopener noreferrer"
         className="border border-hero-hair p-5 hover:border-accent hover:bg-hero-glass transition flex items-start gap-3">
        <IconExternal className="h-5 w-5 text-accent flex-shrink-0 mt-0.5" strokeWidth={2}/>
        <div>
          <div className="font-mono text-[10px] tracking-[0.22em] uppercase text-hero-mute">Sessão 1:1</div>
          <div className="mt-1 font-semibold">Onboarding ao vivo</div>
          <div className="text-xs text-hero-mute mt-0.5">30 min · agenda no Calendar</div>
        </div>
      </a>
    </div>
  );
  return null;
};

/* ----------------------------- APP ----------------------------- */
const App = () => {
  // Detecta versão Revit do query string ?version=YYYY
  const version = useMemo(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const v = params.get("version");
      if (v && VALID_REVIT_VERSIONS.includes(v)) return v;
    } catch {}
    return DEFAULT_REVIT_VERSION;
  }, []);

  const steps = useMemo(() => getSteps(version), [version]);

  const [done, setDone] = useState(() => {
    try {
      const raw = localStorage.getItem("john-install-done-" + version);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  });
  const [active, setActive] = useState(0);

  useEffect(() => {
    try { localStorage.setItem("john-install-done-" + version, JSON.stringify(done)); } catch {}
  }, [done, version]);

  const toggle = (id) => setDone(d => d.includes(id) ? d.filter(x => x !== id) : [...d, id]);
  const reset = () => {
    if (confirm("Resetar progresso da instalação?")) {
      setDone([]);
      setActive(0);
    }
  };

  const pct = Math.round((done.length / steps.length) * 100);
  const current = steps[active];
  const isDone = done.includes(current.id);

  return (
    <main className="min-h-screen relative">
      {/* TOP BAR */}
      <header className="sticky top-0 z-40 bg-hero-bg/85 backdrop-blur border-b border-hero-hair">
        <div className="px-6 md:px-10 h-16 flex items-center justify-between gap-4">
          <div className="flex items-center gap-6">
            <a href="/john/app/" className="inline-flex items-center gap-2 font-mono text-[10px] tracking-[0.24em] uppercase text-hero-mute hover:text-hero-fg transition">
              <IconBack className="h-3 w-3" strokeWidth={2.5}/> Plataforma
            </a>
            <div className="flex items-center gap-3">
              <svg viewBox="0 0 124 88" className="h-7 text-hero-fg" aria-hidden="true">
                <use href="#L4-solid"/>
              </svg>
              <span className="hidden sm:inline-block h-4 w-px bg-hero-hair"/>
              <span className="hidden sm:inline font-mono text-[10px] tracking-[0.28em] uppercase text-hero-mute">Plataforma · Instalação</span>
              <span className="hidden md:inline-flex items-center gap-1.5 px-2 py-1 border border-accent/40 bg-accent/[0.06] font-mono text-[10px] tracking-[0.22em] uppercase text-accent">
                Revit {version}
              </span>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <div className="hidden md:flex items-center gap-3">
              <span className="font-mono text-[10px] tracking-[0.24em] uppercase text-hero-mute tabular-nums">{done.length} / {steps.length} · {pct}%</span>
              <div className="w-40 h-1 bg-hero-hair overflow-hidden rounded-full">
                <div className="h-full bg-accent transition-all duration-500" style={{width: `${pct}%`}}/>
              </div>
            </div>
            <button onClick={reset} className="inline-flex items-center gap-1.5 text-[10px] tracking-[0.18em] uppercase font-mono text-hero-mute-2 hover:text-hero-mute transition px-2 py-1"
              title="Resetar progresso">
              <IconRefresh className="h-3 w-3" strokeWidth={2}/> reset
            </button>
          </div>
        </div>
      </header>

      <div className="grid grid-cols-12 gap-0">
        {/* SIDEBAR */}
        <aside className="col-span-12 md:col-span-3 lg:col-span-3 border-r border-hero-hair md:min-h-[calc(100vh-4rem)] md:sticky md:top-16 md:self-start md:max-h-[calc(100vh-4rem)] md:overflow-y-auto scrollbar-thin">
          <div className="p-6">
            <div className="font-mono text-[10px] tracking-[0.28em] uppercase text-hero-mute mb-4">Passos</div>
            <nav className="space-y-1">
              {steps.map((s, i) => {
                const isCurrent = active === i;
                const isDoneS = done.includes(s.id);
                return (
                  <button key={s.id} onClick={() => setActive(i)}
                    className={`w-full text-left px-3 py-3 border-l-2 transition group ${
                      isCurrent ? "border-accent bg-hero-glass step-active" : "border-transparent hover:border-hero-hair hover:bg-hero-glass/50"
                    } ${isDoneS ? "step-done" : ""}`}>
                    <div className="flex items-start gap-3">
                      <div className={`step-num flex-shrink-0 h-6 w-6 rounded-full border border-hero-hair flex items-center justify-center font-mono text-[11px] tabular-nums ${
                        isDoneS ? "" : isCurrent ? "" : "text-hero-mute"
                      }`}>
                        {isDoneS ? <IconCheck className="h-3 w-3" strokeWidth={3}/> : s.id}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className={`text-sm font-medium ${isCurrent ? "text-hero-fg" : isDoneS ? "text-hero-mute line-through" : "text-hero-fg"}`}>
                          {s.label}
                        </div>
                        <div className="text-[10px] font-mono text-hero-mute-2 mt-0.5 tracking-wider uppercase">{s.time}</div>
                      </div>
                    </div>
                  </button>
                );
              })}
            </nav>
          </div>
        </aside>

        {/* MAIN */}
        <section className="col-span-12 md:col-span-9 lg:col-span-9 px-6 md:px-12 py-10 md:py-14 relative grain-bg">
          <div className="max-w-3xl">
            <div className="font-mono text-[10px] tracking-[0.32em] uppercase text-accent mb-4">
              Passo {String(current.id).padStart(2, "0")} de {String(steps.length - 1).padStart(2, "0")} · {current.time}
            </div>
            <h1 className="font-serif text-3xl md:text-5xl font-medium tracking-[-0.02em] leading-[1.1]">
              {current.title}
            </h1>
            <p className="mt-6 text-base md:text-lg text-hero-mute leading-relaxed text-pretty">
              {current.intro}
            </p>

            <div className="mt-10 space-y-6">
              {current.blocks.map((b, i) => <Block key={i} b={b}/>)}
            </div>

            {/* PASSO NAV */}
            <div className="mt-14 pt-8 border-t border-hero-hair flex items-center justify-between gap-4 flex-wrap">
              <button
                onClick={() => active > 0 && setActive(active - 1)}
                disabled={active === 0}
                className={`inline-flex items-center gap-2 px-4 h-10 text-[10px] tracking-[0.22em] uppercase font-mono border border-hero-hair transition ${
                  active === 0 ? "text-hero-mute-2 cursor-not-allowed" : "text-hero-fg hover:border-accent hover:text-accent"
                }`}>
                <IconBack className="h-3 w-3" strokeWidth={2.5}/> Anterior
              </button>

              <button
                onClick={() => toggle(current.id)}
                className={`inline-flex items-center gap-2 px-5 h-10 text-[10px] tracking-[0.22em] uppercase font-semibold font-mono rounded-full transition ${
                  isDone ? "bg-ok-dark/20 text-ok-dark border border-ok-dark/40" : "bg-accent text-hero-bg hover:bg-cyan-300"
                }`}>
                {isDone ? <><IconCheck className="h-3.5 w-3.5" strokeWidth={3}/> Concluído</> : <><IconCheck className="h-3.5 w-3.5" strokeWidth={2.5}/> Marcar concluído</>}
              </button>

              <button
                onClick={() => active < steps.length - 1 && setActive(active + 1)}
                disabled={active === steps.length - 1}
                className={`inline-flex items-center gap-2 px-4 h-10 text-[10px] tracking-[0.22em] uppercase font-mono border transition ${
                  active === steps.length - 1
                    ? "border-hero-hair text-hero-mute-2 cursor-not-allowed"
                    : "border-accent text-accent hover:bg-accent hover:text-hero-bg"
                }`}>
                Próximo <IconArrowRight className="h-3 w-3" strokeWidth={2.5}/>
              </button>
            </div>

            <div className="mt-16 text-xs font-mono text-hero-mute-2 text-center">
              Progresso salvo localmente neste navegador.
            </div>
          </div>
        </section>
      </div>
    </main>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body></html>
